services:
  - type: web
    name: eurovibe-web
    runtime: python
    plan: starter
    buildCommand: "npm install && npm run build:css && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn eurovibe.wsgi:application --workers 4 --worker-class sync --timeout 60"
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: eurovibe-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.14"

databases:
  - name: eurovibe-db
    plan: starter
