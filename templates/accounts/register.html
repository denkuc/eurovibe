{% extends "base.html" %}

{% block title %}Реєстрація · ЄвроВайб{% endblock %}

{% block content %}
  <section class="auth-card">
    <p class="eyebrow">New account</p>
    <h1>Реєстрація</h1>
    <form method="post" action="{% url 'accounts:register' %}">
      {% include "accounts/_form.html" %}
      <button class="button-primary" type="submit">Створити акаунт</button>
    </form>
    <p class="auth-switch">
      Вже маєте акаунт?
      <a href="{% url 'accounts:login' %}{% if next %}?next={{ next|urlencode }}{% endif %}">Увійти</a>
    </p>
  </section>
{% endblock %}
