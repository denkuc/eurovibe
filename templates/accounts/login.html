{% extends "base.html" %}

{% block title %}Логін · ЄвроВайб{% endblock %}

{% block content %}
  <section class="auth-card">
    <p class="eyebrow">Session login</p>
    <h1>Логін</h1>
    <form method="post" action="{% url 'accounts:login' %}">
      {% include "accounts/_form.html" %}
      <button class="button-primary" type="submit">Увійти</button>
    </form>
    <p class="auth-switch">
      Ще не маєте акаунта?
      <a href="{% url 'accounts:register' %}{% if next %}?next={{ next|urlencode }}{% endif %}">Зареєструватися</a>
    </p>
  </section>
{% endblock %}
